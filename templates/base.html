<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Платформа проведения опросов{% endblock %}</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background:#f5f5f7; min-height:100vh; padding:20px; animation:fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
        .container { max-width:900px; margin:0 auto; background:white; border-radius:18px; box-shadow:0 20px 40px rgba(0,0,0,0.08); padding:40px; }
        h1 { font-size:32px; font-weight:600; color:#1d1c1d; margin-bottom:8px; }
        .subtitle { color:#6e6d73; font-size:17px; margin-bottom:30px; border-bottom:1px solid #e6e6e9; padding-bottom:20px; }
        .error { color:#ff3b30; margin-bottom:15px; }
        .button { display:inline-block; background:#0071e3; color:white; border:none; padding:14px 32px; border-radius:40px; font-weight:500; font-size:17px; cursor:pointer; transition:all 0.2s; text-decoration:none; text-align:center; }
        .button:hover { background:#0077ed; transform:scale(1.02); }
        .button.secondary { background:#e6e6e9; color:#1d1c1d; }
        .button.small { padding:8px 16px; font-size:14px; }
        input, textarea, select { width:100%; padding:14px; border:1px solid #d2d2d7; border-radius:12px; font-size:16px; transition:all 0.2s; background:white; }
        input:focus, textarea:focus, select:focus { outline:none; border-color:#0071e3; box-shadow:0 0 0 3px rgba(0,113,227,0.2); }
        label { display:block; font-weight:500; margin-bottom:8px; color:#1d1c1d; }
        .required-star { color:#ff3b30; }
        .form-group { margin-bottom:25px; animation:fadeIn 0.4s ease; }
        .progress-container { background:#e6e6e9; border-radius:20px; height:24px; margin:20px 0; overflow:hidden; }
        .progress-bar { background:#28a745; height:24px; width:0%; transition:width 0.5s ease; display:flex; align-items:center; justify-content:flex-end; padding-right:10px; color:white; font-size:14px; font-weight:500; }
        .stats-grid { display:flex; gap:30px; margin-bottom:30px; }
        .stat-card { flex:1; background:#f5f5f7; border-radius:12px; padding:20px; text-align:center; }
        .stat-number { font-size:36px; font-weight:600; color:#1d1c1d; }
        .stat-label { color:#6e6d73; font-size:15px; margin-top:5px; }
        .two-columns { display:flex; gap:30px; margin-top:30px; }
        .column { flex:1; background:#f5f5f7; border-radius:12px; padding:20px; }
        .column h3 { font-size:20px; font-weight:600; margin-bottom:15px; color:#1d1c1d; }
        .employee-list { list-style:none; max-height:300px; overflow-y:auto; }
        .employee-list li { padding:8px 0; border-bottom:1px solid #d2d2d7; }
        .green { color:#28a745; }
        .red { color:#ff3b30; }
        .flex { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; }
        .survey-card { background:#f5f5f7; border-radius:12px; padding:20px; margin-bottom:15px; transition:all 0.2s; border:1px solid transparent; }
        .survey-card:hover { border-color:#0071e3; transform:scale(1.01); }
        .survey-title { font-size:20px; font-weight:600; margin-bottom:8px; }
        .survey-meta { color:#6e6d73; font-size:14px; }
        .question-block { background:#f5f5f7; border-radius:12px; padding:20px; margin-bottom:20px; animation:slideIn 0.3s ease; }
        .option-item { margin-bottom:10px; display:flex; align-items:center; gap:8px; }
        .option-item input[type=radio], .option-item input[type=checkbox] { width:auto; margin:0; }
        @keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
        .hidden { display:none; }
        .fade-in { animation:fadeIn 0.5s ease; }
        @media (max-width:768px) { .stats-grid, .two-columns { flex-direction:column; } }
    </style>
</head>
<body>
    <div class="container">{% block content %}{% endblock %}</div>
</body>
</html>
