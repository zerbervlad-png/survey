{% extends "base.html" %}
{% block title %}Форма опроса{% endblock %}
{% block content %}
    <h1>Обратная связь</h1>
    <div class="subtitle">Поделитесь своими мыслями о работе</div>

    <form action="/submit_survey" method="POST">
        <div class="form-group">
            <label for="name">Выберите ФИО <span class="required-star">*</span></label>
            <select id="name" name="name" required style="width: 100%; padding: 14px; border: 1px solid #d2d2d7; border-radius: 12px; font-size: 16px; background-color: white;">
                <option value="" disabled selected>— Выберите сотрудника —</option>
                {% for emp in employees %}
                    <option value="{{ emp }}">{{ emp }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label for="likes">Что вам нравится в работе? <span class="required-star">*</span></label>
            <textarea id="likes" name="likes" rows="4" placeholder="Напишите, что приносит удовольствие, что мотивирует..." required></textarea>
        </div>

        <div class="form-group">
            <label for="dislikes">Что кажется скучным, нудным или неинтересным? <span class="required-star">*</span></label>
            <textarea id="dislikes" name="dislikes" rows="4" placeholder="Что хотелось бы изменить, улучшить или автоматизировать..." required></textarea>
        </div>

        <button type="submit" class="button" style="width: 100%;">Сохранить и отправить</button>
    </form>
{% endblock %}
